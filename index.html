<style>
  :root {
    --pink:#f72585; --purple:#7209b7; --cyan:#4cc9f0;
    --bg:#0d0d1a; --card:#13132a; --card2:#1a1a35;
    --text:#f0f0ff; --muted:#9999cc; --border:rgba(247,37,133,0.18);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background:
    radial-gradient(ellipse 60% 40% at 20% 20%,rgba(114,9,183,.25) 0%,transparent 70%),
    radial-gradient(ellipse 50% 50% at 80% 10%,rgba(247,37,133,.18) 0%,transparent 70%);
    pointer-events:none;z-index:0;}

  /* NAV */
  nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;
    padding:14px 22px;background:rgba(13,13,26,.92);backdrop-filter:blur(18px);
    border-bottom:1px solid var(--border);}
  .logo{font-family:'Space Mono',monospace;font-size:19px;font-weight:700;letter-spacing:2px;
    background:linear-gradient(90deg,var(--pink),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .nav-links{display:flex;gap:7px;}
  .nav-links a{text-decoration:none;padding:6px 15px;border-radius:50px;font-size:13px;font-weight:700;
    color:var(--muted);transition:all .2s;cursor:pointer;}
  .nav-links a.active,.nav-links a:hover{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;}

  /* HERO */
  .hero{position:relative;z-index:1;text-align:center;padding:26px 20px 8px;}
  .hero h1{font-size:clamp(22px,6vw,46px);font-weight:900;
    background:linear-gradient(135deg,#fff 10%,var(--pink) 50%,var(--cyan) 90%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .hero p{margin-top:8px;color:var(--muted);font-size:13px;}

  /* SEARCH */
  .search-wrap{position:relative;z-index:1;max-width:540px;margin:24px auto 0;padding:0 18px;}
  .search-wrap input{width:100%;padding:14px 50px 14px 20px;border-radius:50px;border:2px solid var(--border);
    background:var(--card);color:var(--text);font-size:14px;font-family:'Nunito',sans-serif;outline:none;
    transition:border-color .3s,box-shadow .3s;}
  .search-wrap input:focus{border-color:var(--pink);box-shadow:0 0 18px rgba(247,37,133,.2);}
  .search-wrap input::placeholder{color:var(--muted);}
  .s-icon{position:absolute;right:32px;top:50%;transform:translateY(-50%);font-size:18px;opacity:.5;}

  /* PILLS */
  .cats{position:relative;z-index:1;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;padding:20px 14px 0;}
  .pill{padding:7px 15px;border-radius:50px;font-size:12px;font-weight:700;cursor:pointer;
    border:2px solid transparent;background:var(--card2);color:var(--muted);transition:all .2s;user-select:none;}
  .pill:hover{border-color:var(--pink);color:var(--pink);}
  .pill.active{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;
    box-shadow:0 4px 14px rgba(247,37,133,.3);}

  /* SECTION */
  .sec-title{position:relative;z-index:1;font-size:17px;font-weight:900;padding:26px 18px 11px;
    display:flex;align-items:center;gap:9px;}
  .sec-title b{display:inline-block;width:5px;height:19px;border-radius:3px;
    background:linear-gradient(to bottom,var(--pink),var(--cyan));}

  /* GRID */
  .grid{position:relative;z-index:1;display:grid;
    grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:13px;padding:0 15px 40px;}

  /* CARD */
  .card{background:var(--card);border-radius:18px;border:1px solid var(--border);overflow:hidden;
    cursor:pointer;transition:transform .25s,box-shadow .25s;animation:fadeUp .5s ease both;}
  .card:hover{transform:translateY(-6px) scale(1.02);
    box-shadow:0 14px 34px rgba(247,37,133,.22);border-color:var(--pink);}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

  /* THUMB */
  .thumb{position:relative;width:100%;height:108px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .blur-bg{position:absolute;inset:0;filter:blur(35px);opacity:.5;}

  /* LOGO BOX */
  .logo-box{position:relative;z-index:2;width:68px;height:68px;border-radius:16px;overflow:hidden;
    box-shadow:0 6px 18px rgba(0,0,0,.55);background:var(--card2);
    display:flex;align-items:center;justify-content:center;font-size:34px;}
  .logo-box img{width:100%;height:100%;object-fit:cover;display:block;}
  .logo-box .fb{display:none;font-size:34px;}

  .cat-tag{position:absolute;bottom:7px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,.65);backdrop-filter:blur(6px);color:var(--cyan);
    font-size:9px;font-weight:700;padding:3px 9px;border-radius:50px;white-space:nowrap;z-index:3;}

  /* BODY */
  .card-body{padding:10px 11px 12px;}
  .card-name{font-size:12px;font-weight:800;line-height:1.3;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:3px;}
  .card-ver{font-size:10px;color:var(--muted);margin-bottom:8px;}
  .dl-btn{display:block;width:100%;padding:8px;border-radius:50px;border:none;
    background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;
    font-size:11.5px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;
    transition:opacity .2s,transform .15s;}
  .dl-btn:hover{opacity:.85;transform:scale(1.03);}

  /* TOAST */
  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(80px);
    background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;
    padding:12px 24px;border-radius:50px;font-weight:700;font-size:13px;z-index:999;
    transition:transform .4s cubic-bezier(.22,1,.36,1);pointer-events:none;white-space:nowrap;}
  .toast.show{transform:translateX(-50%) translateY(0);}

  footer{position:relative;z-index:1;text-align:center;padding:26px 20px;
    color:var(--muted);font-size:12px;border-top:1px solid var(--border);}
  footer em{background:linear-gradient(90deg,var(--pink),var(--cyan));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;font-style:normal;font-weight:800;}
  .empty{position:relative;z-index:1;text-align:center;padding:60px 20px;
    color:var(--muted);font-size:15px;display:none;}
  .empty.show{display:block;}

  @media(max-width:480px){
    .grid{grid-template-columns:repeat(2,1fr);gap:11px;}
    .logo{font-size:15px;}

</style>

// ── Fallback: agar Google Play CDN block ho toh emoji dikhao ──
function onImgError(img) {
  img.style.display = 'none';
  img.nextElementSibling.style.display = 'flex';
}

let activeType='all', activeCat='all', searchQ='';

function renderGrid(){
  const grid=document.getElementById('grid');
  const empty=document.getElementById('empty');
  const title=document.getElementById('secTitle');
  grid.innerHTML='';

  const items=APPS.filter(d=>
    (activeType==='all'||d.type===activeType)&&
    (activeCat==='all'||d.cat===activeCat)&&
    d.name.toLowerCase().includes(searchQ)
  );

  if(!items.length){
    empty.classList.add('show'); title.style.display='none'; return;
  }
  empty.classList.remove('show');
  title.style.display='flex';
  title.innerHTML=`<b></b> ${items.length} Apps`;

  items.forEach((d,i)=>{
    const card=document.createElement('div');
    card.className='card';
    card.style.animationDelay=(i*50)+'ms';
    card.innerHTML=`
      <div class="thumb" style="background:${d.bg}18">
        <div class="blur-bg" style="background:${d.bg}"></div>
        <div class="logo-box">
          <img src="${d.img}=s180-rw" alt="${d.name}" onerror="onImgError(this)">
          <span class="fb">${d.icon}</span>
        </div>
        <div class="cat-tag">${d.cat}</div>
      </div>
      <div class="card-body">
        <div class="card-name">${d.name}</div>
        <div class="card-ver">${d.ver}</div>
        <button class="dl-btn" onclick="dl(event,'${d.name}','${d.url}')">⬇ Download</button>
      </div>`;
    grid.appendChild(card);
  });
}

function fType(t,el){
  activeType=t;
  document.querySelectorAll('.nav-links a').forEach(a=>a.classList.remove('active'));
  el.classList.add('active'); renderGrid();
}
function fCat(c,el){
  activeCat=c;
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active'); renderGrid();
}
function doSearch(){
  searchQ=document.getElementById('q').value.toLowerCase().trim(); renderGrid();
}
function dl(e,name,url){
  e.stopPropagation();
  window.open(url,'_blank');
  const t=document.getElementById('toast');
  t.textContent=`⬇ ${name} download shuru!`;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}
